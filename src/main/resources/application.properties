spring.application.name=Analyzer

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8081

# MySQL Config
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET}

# RapidAPI
rapidapi.key=${RAPIDAPI_KEY}
rapidapi.host=${RAPIDAPI_HOST}

# OpenWebNinja
openwebninja.api-key=${OPENWEBNINJA_API_KEY}
openwebninja.base-url=${OPENWEBNINJA_BASE_URL}

# Mistral AI
spring.ai.openai.api-key=${MISTRAL_API_KEY}
spring.ai.openai.base-url=${MISTRAL_BASE_URL}
spring.ai.openai.chat.options.model=${MISTRAL_MODEL}

# Groq AI
groq.api.key=${GROQ_API_KEY}
groq.base-url=${GROQ_BASE_URL}
groq.model=${GROQ_MODEL}