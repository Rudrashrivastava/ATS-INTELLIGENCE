spring.application.name=Analyzer

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8081

# MySQL Config
spring.datasource.url=jdbc:mysql://localhost:3306/ats
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:java}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#jwt config
jwt.secret=${JWT_SECRET_KEY:8e9f5e3e2a4c1b9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5}
JWT_SECRET=${jwt.secret}

# AI Engine Keys (Masked for GitHub)
spring.ai.openai.api-key=${MISTRAL_API_KEY}
spring.ai.openai.base-url=https://api.mistral.ai
spring.ai.openai.chat.options.model=mistral-small-latest

groq.api.key=${GROQ_API_KEY}
groq.base-url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

zenserp.key=${ZENSERP_API_KEY}
